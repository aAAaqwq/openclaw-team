name: Skill PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'skills/**'
      - 'skills/**/SKILL.md'

  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

jobs:
  review-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Get changed skill files
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PR_NUMBER=${{ inputs.pr_number }}
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi
          
          # Get list of SKILL.md files changed in this PR
          CHANGED_FILES=$(git diff origin/main...HEAD --name-only --diff-filter=AM \
            | grep -E '^skills/[^/]+/SKILL\.md$' \
            | head -10)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No skill SKILL.md files changed"
            echo "files=" >> $GITHUB_OUTPUT
          else
            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          fi

      - name: Review each changed skill
        if: steps.changed.outputs.files != ''
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          cd /home/aa/clawd/repos/AGI-Super-Team
          
          # Get the repo name for the API
          REPO_NAME=$(basename "$PWD")
          
          for file in ${{ steps.changed.outputs.files }}; do
            echo "=== Reviewing: $file ==="
            
            # Extract skill name from path
            SKILL_NAME=$(echo "$file" | cut -d'/' -f2)
            
            # Read the SKILL.md content (first 4000 chars to avoid token overflow)
            CONTENT=$(head -c 4000 "$file")
            
            # Build prompt for review
            REVIEW_PROMPT="You are reviewing a skill submission for the AGI-Super-Team repository.

## Skill: $SKILL_NAME

Review this SKILL.md and provide a structured review with:

1. **Completeness** (1-5): Does it have all required sections (name, description, triggers, steps, output)?
2. **Clarity** (1-5): Is the description clear? Are instructions actionable?
3. **Correctness** (1-5): Are there any errors or anti-patterns?
4. **Overall** (1-5): Would this skill be useful as-is?

Then provide:
- **Strengths**: What's good about this skill?
- **Issues**: What needs fixing?
- **Recommendation**: APPROVE / REQUEST_CHANGES / REJECT

Be strict but fair. Focus on whether the skill is actually usable and follows best practices.

## SKILL.md Content:
$CONTENT"

            # Call GLM API for review
            RESPONSE=$(curl -s -X POST \
              "https://open.bigmodel.cn/api/coding/paas/v4/chat/completions" \
              -H "Authorization: Bearer $ZAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg model "glm-4" \
                --argcontent "$REVIEW_PROMPT" \
                '{
                  model: $model,
                  max_tokens: 800,
                  messages: [{"role": "user", "content": $argcontent}]
                }')")
            
            REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            
            if [ -n "$REVIEW_TEXT" ]; then
              echo "Review for $SKILL_NAME:"
              echo "$REVIEW_TEXT"
              echo ""
              
              # Post review comment via GitHub CLI
              gh pr comment $PR_NUMBER --body "## 🤖 Skill Review: $SKILL_NAME

$REVIEW_TEXT

---
*Auto-generated by skill-pr-review workflow*"
            else
              echo "Failed to get review for $SKILL_NAME"
              echo "Response: $RESPONSE"
            fi
          done

      - name: No skills changed message
        if: steps.changed.outputs.files == ''
        run: |
          echo "No SKILL.md files were changed in this PR."
